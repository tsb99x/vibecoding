<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bond Profitability Calculator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav class="top-nav">
    <a href="../index.html" class="back-link">← Back to main page</a>
  </nav>
  <div class="container">
    <header>
      <h1>Bond Profitability Calculator</h1>
    </header>

    <div class="form-group">
      <label for="face-value">Face Value</label>
      <input type="number" id="face-value" placeholder="e.g. 1000" min="0" step="any">
    </div>

    <div class="form-group">
      <label for="purchase-price">Purchase Price</label>
      <input type="number" id="purchase-price" placeholder="e.g. 950" min="0" step="any">
    </div>

    <div class="form-group">
      <label for="annual-coupon-rate">Annual Coupon Rate (%)</label>
      <input type="number" id="annual-coupon-rate" placeholder="e.g. 5" min="0" step="any">
    </div>

    <div class="form-group">
      <label for="frequency">Coupon Frequency (per year)</label>
      <select id="frequency">
        <option value="1">Annual</option>
        <option value="2">Semi-annual</option>
        <option value="4">Quarterly</option>
        <option value="12">Monthly</option>
      </select>
    </div>

    <div class="form-group">
      <label for="years-held">Years Held</label>
      <input type="number" id="years-held" placeholder="e.g. 3" min="0" step="any">
    </div>

    <div class="form-group">
      <label for="sale-price">Sale / Redemption Price</label>
      <input type="number" id="sale-price" placeholder="e.g. 1000" min="0" step="any">
    </div>

    <button id="calculate-btn">Calculate</button>

    <p class="error-message" id="error-message"></p>

    <div class="results" id="results">
      <!-- Results will be injected here by JavaScript -->
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
