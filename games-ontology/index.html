<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Games Ontology - Knowledge Graph</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://d3js.org/d3.v7.min.js"></script>
</head>
<body>
    <header>
        <h1>Games Ontology</h1>
        <div class="search-container">
            <input type="text" id="search-input" placeholder="Search games, genres, studios..." autocomplete="off">
            <button id="search-clear" class="hidden">&times;</button>
        </div>
    </header>

    <main class="layout">
        <div class="graph-wrapper" id="graph-container"></div>

        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h2>Legend</h2>
            </div>
            <div class="legend" id="legend"></div>

            <div class="detail-panel" id="detail-panel">
                <div class="panel-header">
                    <h2 id="detail-title">Node Details</h2>
                    <button id="detail-close" class="hidden">&times;</button>
                </div>
                <div class="panel-body" id="detail-body">
                    <p class="detail-placeholder">Click a node to see its details</p>
                </div>
            </div>
        </aside>
    </main>

    <footer>
        <p><a href="../index.html">&larr; Back to Main Page</a></p>
    </footer>

    <div class="tooltip" id="tooltip"></div>

    <script src="script.js"></script>
</body>
</html>
